<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniTok EDU</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<img src="logo.png" style="width:120px; margin-top:20px;">
<h1>MiniTok EDU</h1>

<button id="loginBtn">Iniciar sesión con Google</button>
<button id="logoutBtn" style="display:none;">Cerrar sesión</button>
<p id="userInfo"></p>

<input type="file" id="videoInput" accept="video/*">

<select id="category">
  <option value="Robótica">Robótica</option>
  <option value="Programación">Programación</option>
  <option value="STEM">STEM</option>
  <option value="Proyecto Final">Proyecto Final</option>
</select>

<input type="text" id="description" placeholder="Describe tu proyecto">

<h3>Grabar video (máx. 10 segundos)</h3>

<video id="cameraPreview" autoplay muted width="300"></video>
<br>

<button onclick="startRecording()">Grabar</button>
<button onclick="stopRecording()">Detener</button>

<div id="feed" class="tiktokFeed"></div>

<h3 id="adminTitle" style="display:none;">Panel de Aprobación</h3>
<div id="adminPanel"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
